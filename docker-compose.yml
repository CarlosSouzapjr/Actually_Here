services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: meubanco
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d meubanco"]
      interval: 5s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ./infra/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./infra/mosquitto/data:/mosquitto/data
      - ./infra/mosquitto/log:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"

  backend:
    build:
      context: ./backend
    # container_name e ports removidos para permitir a escala (--scale backend=3)
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/meubanco
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: adminpassword
      MQTT_BROKER_URL: tcp://mosquitto:1883
      ZOOKEEPER_URL: zookeeper:2181 # Adicionado para o backend achar o ZK na rede Docker
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
      zookeeper:
        condition: service_started # Garante que o ZK suba antes do backend

  backend-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:8080"
    depends_on:
      - backend

  zookeeper:
    image: zookeeper:3.9
    ports:
      - "2181:2181"
    environment:
      ZOO_MY_ID: 1
      ZOO_PORT: 2181
