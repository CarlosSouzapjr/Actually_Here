services:
  postgres:
    image: postgres:15-alpine
    container_name: meubanco_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: meubanco
    ports:
      - "5432:5432"

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: actually_here_mqtt
    volumes:
      - ./infra/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./infra/mosquitto/data:/mosquitto/data
      - ./infra/mosquitto/log:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"